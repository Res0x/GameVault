{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GameVault{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'games/css/style.css' %}">
</head>
<body id="page-top">
    <header class="site-header">
        <div class="container">
            <nav class="site-nav">
                <a href="{% url 'games:home' %}">Главная</a>
                <a href="{% url 'games:game_list' %}">Список игр</a>
                <a href="{% url 'games:ratings' %}">Рейтинг</a>
                <a href="{% url 'games:game_create' %}">Добавить игру</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>GameVault, 2026</p>
        </div>
    </footer>
    <a href="#page-top" class="button back-to-top" aria-label="Наверх">↑</a>
</body>
</html>
