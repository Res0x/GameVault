{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}GameVault{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'games/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <nav class="site-nav">
                <a href="{% url 'home' %}">Главная</a>
                <a href="{% url 'game_list' %}">Список игр</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>GameVault, 2026</p>
        </div>
    </footer>
</body>
</html>
